name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: freenet-example-linux
            binary: freenet-example
          - os: macos-latest
            artifact: freenet-example-macos
            binary: freenet-example
          - os: windows-latest
            artifact: freenet-example-windows.exe
            binary: freenet-example.exe

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: freenet_example

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Validate with simple_validate test
        run: cargo test --test simple_validate --release -- --nocapture

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: freenet_example/target/release/${{ matrix.binary }}

  verify:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: verify-artifacts

      - name: Check all artifacts are present and non-empty
        run: |
          set -e
          echo "=== Downloaded artifacts ==="
          find verify-artifacts -type f -ls

          for f in verify-artifacts/*/freenet-example*; do
            size=$(stat --format=%s "$f")
            echo "Checking $f (${size} bytes)"
            test "$size" -gt 1000000 || { echo "ERROR: $f too small ($size bytes)"; exit 1; }
          done

          echo "=== All artifacts verified ==="

  create-release:
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## freenet-example ${{ github.ref_name }}

            ### Download

            | Platform | Binary |
            |----------|--------|
            | Linux | freenet-example-linux |
            | macOS | freenet-example-macos |
            | Windows | freenet-example-windows.exe |

            ### Usage

            ```bash
            chmod +x freenet-example-linux
            ./freenet-example-linux --standalone
            ```

            No dependencies required. Runs an in-process freenet node.
          files: release-artifacts/**/*
