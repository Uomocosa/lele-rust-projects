[tasks.build-contract]
description = "Build the clicker contract WASM"
command = "cargo"
args = ["build", "--release", "--target", "wasm32-unknown-unknown"]
cwd = "./contract"

[tasks.copy-wasm]
description = "Copy WASM to repo root for include_bytes! (used by binary + tests)"
command = "cp"
args = ["target/wasm32-unknown-unknown/release/clicker_contract.wasm", "../contract/clicker_contract.wasm"]
cwd = "./contract"
dependencies = ["build-contract"]

[tasks.run-publisher]
description = "Connect to an existing node as publisher"
command = "cargo"
args = ["run", "--", "--role", "publish"]

[tasks.run-subscriber]
description = "Connect to an existing node as subscriber"
command = "cargo"
args = ["run", "--", "--role", "subscribe"]

[tasks.test]
description = "Build contract WASM then run all tests"
dependencies = ["copy-wasm"]
command = "cargo"
args = ["test", "--", "--nocapture"]

[tasks.test-no-capture]
description = "Build contract WASM then run tests without output capture (for debugging)"
dependencies = ["copy-wasm"]
command = "cargo"
args = ["test", "--", "--nocapture", "--test-threads", "1"]

[tasks.clean]
description = "Clean all build artifacts"
command = "bash"
args = ["-c", "cargo clean && cd contract && cargo clean"]
