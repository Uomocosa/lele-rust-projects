[tasks.build-contract]
description = "Build the clicker contract WASM"
command = "cargo"
args = ["build", "--release", "--target", "wasm32-unknown-unknown"]
cwd = "./contract"

[tasks.start-local-node]
description = "Start a local freenet node in background (no P2P)"
command = "bash"
args = ["-c", "freenet local &"]

[tasks.start-node]
description = "Start a freenet node in background (network/P2P mode)"
command = "bash"
args = ["-c", "freenet network &"]

[tasks.wait-for-node]
description = "Wait for the freenet node WebSocket API to be ready"
command = "bash"
args = ["-c", "for i in $(seq 1 30); do curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:7509/ 2>/dev/null | grep -q '200\\|400\\|404' && break; sleep 1; done"]

[tasks.run-publisher]
description = "Run the clicker client in publish mode (deploys + increments)"
command = "cargo"
args = ["run", "--", "--role", "publish"]

[tasks.run-subscriber]
description = "Run the clicker client in subscribe mode (subscribes + increments)"
command = "cargo"
args = ["run", "--", "--role", "subscribe"]

[tasks.run]
description = "Full pipeline: build contract, start local node, run publisher"
dependencies = ["build-contract", "start-local-node", "wait-for-node", "run-publisher"]

[tasks.run.postlude]
description = "Kill the local freenet node after client exits"
command = "bash"
args = ["-c", "pkill -f 'freenet local' 2>/dev/null; exit 0"]

[tasks.run-network]
description = "Full pipeline: build contract, start network node, run publisher"
dependencies = ["build-contract", "start-node", "wait-for-node", "run-publisher"]

[tasks.run-network.postlude]
description = "Kill the network freenet node after client exits"
command = "bash"
args = ["-c", "pkill -f 'freenet network' 2>/dev/null; exit 0"]

[tasks.clean]
description = "Clean all build artifacts"
command = "bash"
args = ["-c", "cargo clean && cd contract && cargo clean"]
